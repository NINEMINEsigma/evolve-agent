<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ffffff; overflow: hidden; }
    body.theme-dark { background: #1e1e1e; }
    #root svg { display: block; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
    window.renderMermaid = async function(definition, theme) {
      try {
        mermaid.initialize({
          startOnLoad: false,
          theme: theme || 'default',
          securityLevel: 'loose',
        });
        const id = 'm-' + Date.now();
        const { svg } = await mermaid.render(id, definition);
        document.getElementById('root').innerHTML = svg;
        window.__mermaidReady = true;
        return { success: true };
      } catch (err) {
        window.__mermaidReady = true;
        window.__mermaidError = err.message;
        return { success: false, error: err.message };
      }
    };
  </script>
</body>
</html>
